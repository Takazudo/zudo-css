name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: doc/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir doc install --frozen-lockfile

      - name: Typecheck
        run: pnpm --dir doc typecheck

      - name: Build
        run: pnpm --dir doc build
