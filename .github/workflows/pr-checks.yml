name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: doc/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir doc install --frozen-lockfile
      - name: Generate data
        run: pnpm --dir doc run generate
      - name: Quality checks
        run: pnpm --dir doc run check

  build-and-preview:
    name: Build and Deploy Preview
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: doc/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir doc install --frozen-lockfile
      - name: Build
        run: pnpm --dir doc run build
      - name: Nest build under baseUrl path
        run: |
          mkdir -p deploy/pj/zcss
          cp -r doc/build/* deploy/pj/zcss/
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      - name: Deploy preview
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          netlify deploy --dir=deploy --alias="pr-${PR_NUMBER}" --message="PR #${PR_NUMBER}: ${HEAD_REF}"
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://pr-${prNumber}--zudo-css.netlify.app/pj/zcss/`;
            const body = `## Netlify Preview\n\n🔗 **Preview URL:** ${previewUrl}\n\nDeployed from commit: ${context.sha.substring(0, 7)}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(
              (comment) =>
                comment.user.type === 'Bot' &&
                comment.body.includes('Netlify Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
